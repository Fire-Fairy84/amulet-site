<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b0908"><meta name="robots" content="noindex">
<title>Próximamente — AMULET</title>
<link rel="icon" href="/assets/app-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400&amp;family=Hanken+Grotesk:wght@300;400&amp;display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/site.css">
<style>.soon-wrap{min-height:100svh;display:grid;place-items:center;text-align:center;padding:24px}
.soon-wrap h1{font-family:"Cormorant",serif;font-weight:300;font-size:clamp(48px,10vw,88px);margin:0}
.soon-wrap p{color:var(--dim);margin:18px 0 0}.soon-wrap a{color:var(--bone);margin-top:28px;display:inline-block;border-bottom:1px solid var(--faint);text-decoration:none;padding-bottom:3px}
.soon-line{width:min(340px,60vw);height:1px;margin:38px auto 0;display:grid;grid-template-columns:repeat(5,1fr)}
.soon-line span:nth-child(1){background:var(--vermilion)}.soon-line span:nth-child(2){background:var(--lemon)}
.soon-line span:nth-child(3){background:var(--cobalt)}.soon-line span:nth-child(4){background:var(--rose)}.soon-line span:nth-child(5){background:var(--leaf)}</style>
</head>
<body>
<div class="soon-wrap">
  <div>
    <p class="eyebrow" style="text-transform:uppercase;letter-spacing:.08em;color:var(--faint);font-size:12px">AMULET</p>
    <h1>Próximamente<br><span style="color:var(--dim)">Coming soon</span></h1>
    <p>La app se está preparando para iPhone. · The app is being prepared for iPhone.</p>
    <div class="soon-line" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
    <br><a href="/">amulet.cards</a>
  </div>
</div>
</body>
</html>
